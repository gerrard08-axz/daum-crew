<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daum 커뮤니티 크루 미션 현황</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif;background:#f5f4ff;min-height:100vh}
.wrap{max-width:440px;margin:0 auto;padding:24px 16px 60px}
.header{text-align:center;margin-bottom:28px}
.label{font-size:11px;color:#9B97C9;letter-spacing:2px;margin-bottom:6px}
h1{font-size:20px;font-weight:700;color:#2D2A6E}
.wl{font-size:13px;color:#7B78B0;margin-top:4px}
.search-box{display:flex;gap:8px;margin-bottom:20px}
.search-box input{flex:1;padding:12px 16px;border:1.5px solid #D4D2F0;border-radius:12px;font-size:15px;background:#fff;color:#2D2A6E;outline:none}
.search-box input:focus{border-color:#7B6FD0}
.search-box button{padding:12px 18px;background:#7B6FD0;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.my-card{background:#fff;border-radius:20px;border:2px solid #7B6FD0;padding:20px;margin-bottom:16px;display:none}
.top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.avatar{width:48px;height:48px;border-radius:50%;background:#EEEDFE;color:#534AB7;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nick-name{font-size:17px;font-weight:700;color:#2D2A6E}
.crew-tag{font-size:12px;color:#7B6FD0;margin-top:2px}
.week-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.week-tabs::-webkit-scrollbar{display:none}
.week-tab{padding:7px 14px;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid #D4D2F0;background:#fff;color:#9B97C9;line-height:1.4}
.week-tab.active{background:#7B6FD0;color:#fff;border-color:#7B6FD0}
.view-tabs{display:flex;gap:6px;margin-bottom:14px}
.view-tab{flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #D4D2F0;background:#fff;color:#9B97C9;text-align:center}
.view-tab.active{background:#EEEDFE;color:#534AB7;border-color:#7B6FD0}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:#F5F4FF;border-radius:12px;padding:12px;text-align:center}
.s-label{font-size:11px;color:#9B97C9;margin-bottom:4px}
.s-val{font-size:22px;font-weight:700;color:#2D2A6E}
.s-sub{font-size:11px;color:#9B97C9;margin-top:2px}
.prog-wrap{margin-bottom:14px}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:#9B97C9;margin-bottom:6px}
.prog-track{background:#EEEDFE;border-radius:99px;height:10px;overflow:hidden}
.prog-bar{height:100%;border-radius:99px;transition:width .5s}
.card-section{background:#F5F4FF;border-radius:12px;padding:14px;margin-bottom:12px}
.cs-title{font-size:12px;font-weight:700;color:#7B6FD0;margin-bottom:10px}
.h-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.h-row:last-child{margin-bottom:0}
.h-date{font-size:12px;color:#9B97C9;min-width:50px}
.h-bw{flex:1;background:#DDDCF5;border-radius:99px;height:6px;overflow:hidden}
.h-b{height:100%;border-radius:99px}
.h-val{font-size:12px;font-weight:600;color:#534AB7;min-width:28px;text-align:right}
.h-badge{font-size:10px;padding:2px 6px;border-radius:99px;white-space:nowrap}
.ok{background:#C6EFCE;color:#276221}.fail{background:#FFC7CE;color:#9C0006}
.nf{text-align:center;padding:24px;background:#fff;border-radius:16px;border:1.5px dashed #D4D2F0;margin-bottom:20px;display:none;color:#9B97C9;font-size:14px;line-height:1.6}
.dn{font-size:11px;color:#9B97C9;text-align:center;margin-top:16px}
.notice{background:#fffbf0;border-left:3px solid #FFB800;border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:20px;font-size:13px;color:#7B6000;line-height:1.6}
</style>
</head>

<div class="wrap">

    <h1>내 미션 현황</h1>

  </div>

const WEEKS = ["4/20~4/26"];
const CUR   = '4/20~4/26';
const TGT   = {'콘텐츠':{key:'post',val:10},'리액션':{key:'reply',val:35}};
let sw=CUR, curNick='', curView='week';

const gw  = (n,w) => DATA[n]?.weeks?.[w] || {post:0,reply:0};
const gd  = (n) => DATA[n]?.daily || {};
const gt  = c => TGT[c]?.val||10;
const gmv = (c,wd) => c==='콘텐츠'?wd.post:wd.reply;
const gr  = (v,t) => Math.min(Math.round(v/t*100),100);
const bc  = r => r>=100?'#1D9E75':r>=70?'#7B6FD0':'#E24B4A';

function go(){ const v=document.getElementById('si').value.trim(); curNick=v; show(v); }

function show(nick){
  const mc=document.getElementById('mc'), nf=document.getElementById('nf');
  if(!nick||!DATA[nick]){mc.style.display='none';nf.style.display=nick?'block':'none';return;}
  nf.style.display='none'; mc.style.display='block'; sw=CUR;
  const info=DATA[nick];
  document.getElementById('ma').textContent=nick.charAt(0);
  document.getElementById('mn').textContent=nick;
  document.getElementById('mct').textContent=info.crew+' 크루 · 주간 목표 '+gt(info.crew)+'건';
  document.getElementById('wt').innerHTML=WEEKS.map((wk,i)=>
    `<div class="week-tab${wk===sw?' active':''}" onclick="selW('${wk}')">${i+1}주차<br><small style="font-size:10px;font-weight:400">${wk}</small></div>`
  ).join('');
  updWeek(nick); updDaily(nick);
}

function selW(wk){ sw=wk;
  document.querySelectorAll('.week-tab').forEach((t,i)=>t.classList.toggle('active',WEEKS[i]===wk));
  updWeek(curNick); updDaily(curNick);
}

function updWeek(nick){
  const info=DATA[nick], wd=gw(nick,sw), tgt=gt(info.crew);
  const mv=gmv(info.crew,wd), r=gr(mv,tgt), c=bc(r);
  document.getElementById('mpost').textContent=wd.post+'건';
  document.getElementById('mpsub').textContent=info.crew==='콘텐츠'?'목표 '+tgt+'건':'참고용';
  document.getElementById('mreply').textContent=wd.reply+'건';
  document.getElementById('mrsub').textContent=info.crew==='리액션'?'목표 '+tgt+'건':'참고용';
  document.getElementById('mr').textContent=r+'%'; document.getElementById('mr').style.color=c;
  document.getElementById('mpt').textContent=mv+' / '+tgt+'건';
  const mb=document.getElementById('mb'); mb.style.width=r+'%'; mb.style.background=c;
  const mx=Math.max(...WEEKS.map(w=>gmv(info.crew,gw(nick,w))),tgt);
  document.getElementById('weekHistory').innerHTML=WEEKS.map((wk,i)=>{
    const wd2=gw(nick,wk), mv2=gmv(info.crew,wd2), ok=mv2>=tgt, p=Math.round(mv2/mx*100);
    const cur=wk===sw?' style="font-weight:700;color:#2D2A6E"':'';
    return `<div class="h-row"><div class="h-date"${cur}>${i+1}주차 ${wk}</div><div class="h-bw"><div class="h-b" style="width:${p}%;background:${ok?'#1D9E75':'#7B6FD0'};"></div></div><div class="h-val">${mv2}</div><div class="h-badge ${ok?'ok':'fail'}">${ok?'달성':'미달'}</div></div>`;
  }).join('');
}

function updDaily(nick){
  const info=DATA[nick], daily=gd(nick), tgt=gt(info.crew);
  const weekDays=Object.entries(daily).filter(([d,v])=>v.week===sw).sort((a,b)=>a[0].localeCompare(b[0]));
  document.getElementById('dailyTitle').textContent=sw+' 일자별 기록';
  if(!weekDays.length){document.getElementById('dailyRows').innerHTML='<div style="text-align:center;padding:16px;color:#9B97C9;font-size:13px;">이 주차에 활동 기록이 없어요</div>';return;}
  const mx=Math.max(...weekDays.map(([,v])=>gmv(info.crew,v)),1);
  document.getElementById('dailyRows').innerHTML=weekDays.map(([date,v])=>{
    const mv=gmv(info.crew,v), p=Math.round(mv/mx*100);
    return `<div class="h-row"><div class="h-date">${date}</div><div class="h-bw"><div class="h-b" style="width:${p}%;background:#7B6FD0;"></div></div><div class="h-val">${mv}</div><div style="font-size:11px;color:#9B97C9;min-width:48px">원${v.post}·답${v.reply}</div></div>`;
  }).join('');
}

function setView(type,el){
  curView=type;
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('weekView').style.display=type==='week'?'block':'none';
  document.getElementById('dailyView').style.display=type==='daily'?'block':'none';
}

const urlNick=new URLSearchParams(window.location.search).get('nick')||'';
if(urlNick){document.getElementById('si').value=urlNick;curNick=urlNick;show(urlNick);}
